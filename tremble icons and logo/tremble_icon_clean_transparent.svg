      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
  </defs>

  <!-- Centered Icon Group -->
  <g transform="translate(110, 110) scale(1.12) translate(-3.5, -20)">
